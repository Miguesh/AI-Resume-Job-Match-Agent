name: Feature request
description: Propose a maintainable product or engineering improvement.
title: "[Feature]: "
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem before proposing an implementation. Please keep
        real resumes, job applications, credentials, and personal data out of the issue.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues and did not find this request.
          required: true
        - label: This request does not require fabricating candidate qualifications.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: Who has the problem, and what outcome are they unable to achieve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe the desired behavior without assuming a specific implementation.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe current workarounds or simpler options.

  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - API and developer experience
        - Resume or job extraction
        - Explainable matching
        - Recommendations and optimization
        - Export
        - Persistence and operations
        - Security and privacy
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Suggested acceptance criteria
      description: List observable conditions that would make the request complete.

  - type: textarea
    id: risks
    attributes:
      label: Privacy, security, cost, or compatibility considerations
      description: Note any impact on PII, LLM cost, public APIs, or stored data.
