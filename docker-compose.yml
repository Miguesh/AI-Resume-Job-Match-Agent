name: resume-job-match-agent

services:
  api:
    build:
      context: .
      target: runtime
    init: true
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_API_KEYS: ${APP_API_KEYS:-}
      APP_ALLOWED_HOSTS: ${APP_ALLOWED_HOSTS:-localhost,127.0.0.1,testserver}
      AI_PROVIDER: ${AI_PROVIDER:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-luna}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-16000}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-resume_matcher}:${POSTGRES_PASSWORD:-change-me-before-production}@postgres:5432/${POSTGRES_DB:-resume_matcher}
      DATABASE_AUTO_CREATE_SCHEMA: "false"
      STORAGE_PATH: /app/data/uploads
      LOG_JSON: "true"
    command: >-
      sh -c "alembic upgrade head &&
      uvicorn resume_matcher.main:app --host 0.0.0.0 --port 8000 --workers 2 --no-access-log"
    ports:
      - "8000:8000"
    volumes:
      - resume_uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resume_matcher}
      POSTGRES_USER: ${POSTGRES_USER:-resume_matcher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-before-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  resume_uploads:
